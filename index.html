<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        .product-card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .cart-status { background: #248bcf; color: white; padding: 15px; border-radius: 10px; position: sticky; top: 0; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .btn-add { background: #31b545; color: white; border: none; padding: 8px 15px; border-radius: 8px; }
        .btn-remove { background: #e53935; color: white; border: none; padding: 8px 15px; border-radius: 8px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="cart-status" id="status">Корзина пуста</div>

    <div class="product-card">
        <div><b>Пицца</b><br>2500₸</div>
        <button class="btn-add" onclick="addToCart('Пицца', 2500)">+</button>
    </div>

    <div class="product-card">
        <div><b>Кола</b><br>500₸</div>
        <button class="btn-add" onclick="addToCart('Кола', 500)">+</button>
    </div>

    <div class="product-card">
        <div><b>Бургер</b><br>1800₸</div>
        <button class="btn-add" onclick="addToCart('Бургер', 1800)">+</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let cart = [];
        let totalPrice = 0;

        function addToCart(name, price) {
            cart.push(name);
            totalPrice += price;
            updateStatus();
        }

        function updateStatus() {
            const status = document.getElementById('status');
            if (cart.length > 0) {
                status.innerText = `Итого: ${totalPrice}₸ (${cart.length} шт.)`;
                tg.MainButton.setText(`ЗАКАЗАТЬ НА ${totalPrice}₸`);
                tg.MainButton.show();
            }
        }

        // Клик по главной кнопке Telegram "ЗАКАЗАТЬ"
        tg.MainButton.onClick(function() {
            let data = {
                items: cart.join(", "),
                total: totalPrice
            };
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
